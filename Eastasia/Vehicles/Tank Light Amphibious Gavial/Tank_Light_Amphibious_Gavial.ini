Affenmännlein
Vermag er nicht, sie zu öffnen?
Das Affenmännlein sieht sich um, sieht die nahenden Polizisten und springt vom Schweinemann ab und verschwindet irgendwo in der Nähe um sich zu verstecken. 

Der Schweinemann versucht weiter, die Tür zu öffnen. Inzwischen haben die Polizisten 1 und 2 ihn erreicht. 
