;******************************************************************************
;*** Allied Aerodrome *********************************************************
;******************************************************************************
; This is the four-slot one. 
; Allied aircraft production is organized differently from the Soviet one. 
; This pad produces both 
; For Soviets, the Helipad produces helicopter, Airfield produces planes, and anything else (airships?) is produced by the Factory. 

; Dual-function: 
; 1) Reinforcements Drop
; 2) Deepstrike
; So it fills the same roles as Chronosphere. 
; (With the exception of Chrono Reinforcements II and Chronoshift II.)
; Dock is complicated, as this is supposed to "dock" two different things in different ways: 
; 1) Dropships should dock to load/unload passengers. 
; 2) Anything else should be able to enter and get passed to docked Dropship. 

; These buildings seem to ascend along several dimensions: 
; Docking - Support - Production
; Number of Slots
; From inter-atmospheric craft to space-craft. 

;------------------------------------------------------------------------------
[BuildingTypes]
+				= UNAerodrome			; UNAirPad
+				= UNAerodrome2
+				= UNAerodrome3

;------------------------------------------------------------------------------
[Animations]
+				= UNAirPad_B
+				= UNAirPad_BD
+				= UNAirPad_BB

