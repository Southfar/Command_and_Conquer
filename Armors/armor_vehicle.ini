;------------------------------------------------------------------------------
; GenericVehicleArmor (ra3)
Armor ArmorVehicle
[ArmorVehicle]
<ArmorTemplate
id				= "BaseVehicleArmor"
SideDamageScalar		= "105"
RearDamageScalar		= "110">
;----- Melee -----
Armor				= MELEE			0%
<Armor
	Damage			= "MELEE"
	Percent			= 			"1"
	/>
;----- Gun -----
Armor				= SMALL_ARMS		50%
<Armor
	Damage			= "GUN"
	Percent			= 			"50"
	/>
Armor				= SNIPER		0%
<Armor
	Damage			= "SNIPER"
	Percent			= "0"
	/>
Armor				= AUTOCANNON		110%
<Armor
	Damage			= "AUTO_CANNON"
	Percent			=			"110"
	/>
;----- Impact -----
<Armor
	Damage			= "IMPACT"
	Percent			= "75"
	/>

<Armor
			Damage="ROCKET"
			Percent="100" />
		<Armor
			Damage="FLAME"
			Percent="40" />
		<Armor
			Damage="FLAK"
			Percent="150" />
<Armor
			Damage="CANNON"
			Percent="150" />
;----- Laser -----
<Armor
Damage="PRISM"
Percent="150"
/>
;----- Electric -----
<Armor
Damage="TESLA"
Percent="150"
/>
;----- 
<Armor
Damage="EXPLOSIVE"
Percent="110"
/>
;----- Radiation -----
<Armor
Damage="RADIATION"
Percent="5"
/>
;----- Subdual -----
Armor			= SUBDUAL_MISSILE		0%
<Armor
	Damage		= "subdual_missile"
		Percent	=				"0"
		/>

Armor			= SUBDUAL_VEHICLE		0%
<Armor
	Damage		= "subdual_vehicle"
		Percent	=				"100"
		/>

Armor			= SUBDUAL_BUILDING		0%
<Armor
	Damage		= "subdual_building"
		Percent	=				"0"
		/>

</ArmorTemplate>
End

