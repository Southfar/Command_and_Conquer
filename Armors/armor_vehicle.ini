; DozerArmor (gen/zh)
Armor ArmorDozer
[ArmorDozer]:[ArmorVehicle]
<ArmorTemplate
id				= "ArmorDozer"
;----- Melee -----
Armor				= CRUSH			50%   
;----- Gun -----
Armor				= SMALL_ARMS		25%
<Armor
	Damage			= "GUN"
		Percent		=			"25"

  Armor = GATTLING        10%    ;resistant to gattling tank
 Armor = COMANCHE_VULCAN 25%
  Armor = FLAME           25%
  Armor = RADIATION       50%   
  Armor = MICROWAVE        0%
  Armor = POISON          25%     
  Armor = SNIPER          0%
  Armor = MELEE           0%    
  Armor = LASER           0%    
  Armor = HAZARD_CLEANUP  0%    
  Armor = PARTICLE_BEAM   100%  
  Armor = KILL_PILOT      100%  
  Armor = SURRENDER       0%    
  Armor = LAND_MINE       0%   ;dozer is made immune to land mines
End

