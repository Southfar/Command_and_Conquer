; Formerly [AutocratBolo], [TankAutocrat] (Tank T-102 Autocrat). 
; This unit is derived from xxx; because there are no stats and we have no code snippets, the stats given here are largely just made up on the spot. 
; This unit is an "epic" unit; it starts on epic level, and progresses through legendary and mythic. 
[TnkTyrXXX]:[TnkTyrYYY]
;----- Text -----
Name					= Tank Tyran
UIName					= name:tank_autocrat
UIDescription				= desc:tank_autocrat
;----- Gfx -----
Image					= tank_autocrat
;----- Taxonomy -----
; NonVehicle				= yes				; Obsolete way of making this unit Toteable = no. 
; Organic				= no				; 
;----- Body -----
Strength				= 14000				; From applying the MARV:Redeemer HP ratio to the Core Defender. 
									; The Autocrat should be more powerful, but less versatile and mobile, than the CD. 
Weight					= 10
Size					= 16
Toteable				= no
SelfHealing				= yes
;----- Weapons -----
Primary					= CannonIN8TslaX4
Secondary				= WpnDummy
;----- Armor -----
; Should be parasiteable, but the TD should not be able to damage it faster than it repairs itself. 
Armor					= concrete			; needs special type? Or heavy? - As per designer, needs special type which only takes full damage from tag:BOLO-killer weapons (and things that bypass defense). 
ImmuneToRadiation			= yes				;; No crew
; ImmuneToPsionics			= yes				; Tricky - no implies immunity to hacking too. ;; Purely machine. 
; EMP.ParalyzeThreshold			= 250				; VC this is serious hardcode business. Wait for EXE recon ; takes this many frames of EMP stacked on the unit before additional frames paralyze it. 
Capturable				= no				; Can a VehicleThief capture this unit? No (per designer, it's an automaton). 
VehicleThief.Allowed			= no				; Neither Ares nor Phobos have a feature to say "'Am I allowed to capture this unit?' 'Yes, but only when its HP are below n%.'", so we will use unit conversion instead. 
OmniCrushResistant			= yes
;----- Movement -----
MovementZone				= CrusherAll
Crusher					= no		; see if this affects infantry if we make all infantry OmniCrushResistant! (since they can slip underneath the bottom of the vehicle) or if OmniCrush automatically assumes Crush. 
OmniCrusher				= yes
TiltsWhenCrushes			= no
TiltsWhenCrushes.Vehicles		= yes
TiltsWhenCrushes.Overlays		= yes
CrushForwardTiltPerFrame		= 0.02
CrushOverlayExtraForwardTilt		= 0.02
CrushSlowdownMultiplier			= 0.02
;----- Load -----
; Crewed				= no					; Was no, because Bolo. 
ProtectedDriver				= yes					; makes no sense without a Crew, but this means DriverKiller can't affect this unit (which it can, otherwise, even with Crewed=no...). 
InitialPayload.Types			= coil
InitialPayload.Nums			= 1
;----- AI -----
AutoCrush=yes
;----- Attach -----
ShieldType				= shield_emp, shield_control
