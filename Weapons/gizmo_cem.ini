; This is the Saboteur's weapon. 
; It is used as the RevengeWeapon on the Saboteur. 
; It only affects buildings, and affects different sets of buildings differently: 
; Group A: Power Plant
; Group B: Barracks, Factory, Air Field
; Group C: Tech Center
; The weapon has three warheads, each affecting only the building of one of these groups. 
