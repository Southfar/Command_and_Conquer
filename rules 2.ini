; RULE*.INI
; *** Tiberian Sun - Reform Rules ***
; If placed in game directory, it will override built in values. Values to be used as multipliers
; or percentages can be specified as either a simple floating point number (embed ".") or as a
; conventional percentage number (append "%"). Values used as distances or time delays
; are specified as simple floating point number. Distance values are expressed in cells. Time
; values are expressed in minutes.
; If multiple rules files are present, the Name field is used to identify between them.

[General]
Name=Tiberian Sun - Reform -- Official Rules of Engagement

; veteran factors           ; ORIGINAL_WAS_CHANGED, set firestrm.ini values to the original TS.
VeteranRatio=4.0 ;5.0 ;10.0 ; ORIGINAL_WAS_CHANGED, lowered slightly (from 5.0 to 4.0).
VeteranCombat=.50  ;.25     ; combat BONUS factor when unit is a veteran
VeteranSpeed=.30            ; speed BONUS factor when unit is a veteran
VeteranSight=0.0            ; LEAVE THIS AT 0.0, ANY OTHER VALUE MIGHT CAUSE CRASHES (as mentioned in ra2 rules).
VeteranArmor=.50   ;.25     ; armor BONUS when unit is a veteran
VeteranROF=.30     ;.20     ; rate of fire BONUS when unit is a veteran
VeteranCap=2                ; maximum veteran level that can be obtained
InitialVeteran=no           ; Do initial forces start as veterans?

; Firestorm.ini additions
DropPodInfantryMinimum=5  ;was 3
DropPodInfantryMaximum=8  ;was 5
EngineerCaptureLevel=1.0
EngineerDamage=0.0

; Special global values that can be adjusted. These are all commented out so they use the default values.
;;HarvesterDumpRate=    ; How fast harvesters unload at refineries (global value, used for all harvs)
;;HarvesterLoadRate=    ; How fast harvesters suck up tiberium     (global value, used for all harvs)
;;TalkBubbleTime=       ; How long script action 52 (talk bubble) appears on screen

; repair and refit
