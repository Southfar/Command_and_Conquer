; ORIGINAL_WAS_CHANGED, made AI use these "default" values. Values were altered to make the AI smarter.
; Note that human players' units use "dumb" values instead, so the units don't try to act independent.
; Note all values should be converted, e.g. 200 changed to 2.0. This is how they are intended to work.
; These values are enabled when the AI builds their 1st HARVGIVER (IsThreatRatingNode=true).
; Don't put in negative values, since they make the AI try overly smart moves to avoid enemies...
; ... which end up spreading out the attack forces, making it easy to pick them off one by one.
; Instead these values make AI take out bigger and special threats first, and avoid running after targets.

; NOTE: I've currently made AI use dumb values too. All these "smart" values do is make the AI try to
;       dodge incoming enemy units in a way that spreads out attack forces, making it easy to seperate them.
;       Even positive values do this. The dumb values simply work better. If you ever want to enable these back,
;       see GAHARVGIVER and NAHARVGIVER IsThreatRatingNode=true.
;
;       I also returned the "smart" values back to their defaults, just to make sure the AI doesn't try to
;       use the new values I experimented with. Experimentation values are commented out.
;

; default threat evaluation controls
MyEffectivenessCoefficientDefault=200       ;200    ;2.0 ; Engage weaker units actively...
TargetEffectivenessCoefficientDefault=-200  ;300    ;3.0 ; ... but take out bigger threats first!
TargetSpecialThreatCoefficientDefault=200   ;800    ;8.0 ; Put heavy focus on special threats, like engineers.
TargetStrengthCoefficientDefault=-200       ;75     ;1.0 ; Testing. < 1 values might screw up AI.
TargetDistanceCoefficientDefault=-10        ;60     ;1.0 ; Testing. < 1 values might screw up AI.

; defaults for dumb threat evaluation
DumbMyEffectivenessCoefficient=200
DumbTargetEffectivenessCoefficient=200
DumbTargetSpecialThreatCoefficient=200
DumbTargetStrengthCoefficient=200
DumbTargetDistanceCoefficient=-1

EnemyHouseThreatBonus=400

