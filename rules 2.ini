; ******* Random Crate Powerups *******
; This specifies the chance for the specified crate powerup to appear
; in a 'random' crate. The chance is expressed in the form of 'shares'
; out of the total shares specified. The second parameter is the animation
; to use when this crate is picked up. The third parameter, if present, specifies
; the data value needed for that crate powerup. They mean different things
; for the different powerups.

; ORIGINAL_WAS_CHANGED, Removed all negative and obsolete crates, and adjusted other crate shares.
;			Decided to remove Cluster missile and Cloak crates as well, for balance reasons.
;                       Also toned down ARMOR, FIREPOWER and SPEED bonuses, since they were too much.
;                       Added UNITX and TIBERX anims for the 2 crates, so they play a sound when picked up.
;                       Note the combined sum of the shares should always be 441 (used in probability counting).

[Powerups]
Money=90,MONEY,2000            ; Chunk o' cash (2000 credits, defined by the 3rd parameter)
Unit=90,<none> ;UNITX          ; Random vehicle (The animation is never played, so disabled it)
Firepower=40,FIREPOWR,1.5 ;2.0 ; Reduced firepower multiplier to 1.5
Armor=40,ARMOR,0.5             ; Reduced armor multiplier to 1.5 (works in reverse, 0.5 = 1.5)
Speed=40,SPEEDA,1.2 ;1.7       ; Reduced speed multiplier to 1.2. Added new SPEEDA anim for it.
Veteran=40,VETERAN,1           ; Veteran upgrade (levels to upgrade)
HealBase=40,HEALALL            ; All buildings to full strength (actually, heals all units too)
Tiberium=30,TIBERX             ; Tiberium patch (can be either green or blue)
Pod=30,LOLMAN                  ; Changed into an empty crate that displays "LOLMAN" animation
Reveal=1,REVEAL                ; Reveal entire map (if you get this twice, it will cloak all map!)
Cloak=0,CLOAK                  ; - REMOVED - (could lead to stealth units before stealth detection available)
ICBM=0,CHEMISLE                ; - REMOVED - (could lead to superweapons when superweapons are disabled)
Darkness=0,SHROUDX             ; - REMOVED - (negative bonus)
Explosion=0,<none>,500         ; - REMOVED - (negative bonus)
Napalm=0,<none>,600            ; - REMOVED - (negative bonus)
Gas=0,<none>,100               ; - REMOVED - (negative bonus)
Invulnerability=0,ARMOR,1.0    ; - REMOVED - (doesn't work, 3rd parameter is supposed to be time in minutes)
Squad=0,<none>                 ; - REMOVED - (doesn't work)
IonStorm=0,<none>              ; - REMOVED - (doesn't work)


