SurvivorDivisor=100 ; ORIGINAL_WAS_CHANGED_FIRESTORM, firestrm.ini change.
PlacementDelay=.05      ; delay before retrying produced object deploy if temporary blockage detected
WeedCapacity=70 ;56 ; ORIGINAL_WAS_CHANGED_SUPERWEAPONS, 25% increase because chemical missile is more powerful now.

; computer and movement controls
CurleyShuffle=yes       ; Should helicopter shuffle position between shots [as in C&C]?
BaseBias=2 ;3      ; POSSIBLE_AI_TWEAKING, returned back to default 2. Think it makes AI choose enemy more randomly.
BaseDefenseDelay=.25    ; minutes delay between sending response teams to deal with base threat
CloseEnough=4.5 ;2.25 ; ORIGINAL_WAS_CHANGED, to prevent large AI teams from getting stuck at regroup.
DamageDelay=1           ; minutes between applying trivial structure damage when low on power
GameSpeedBias=1         ; multiplier to overall game object movement speed
Stray=4.25 ;8.0 ;2.0  ; ORIGINAL_WAS_CHANGED, make sure AI teams don't get stuck. Large value breaks waypoints!
CloakDelay=.02          ; forced delay that subs will remain on surface before allowing to submerge
SuspendDelay=2     ; POSSIBLE_AI_TWEAKING
SuspendPriority=1  ; POSSIBLE_AI_TWEAKING
FlightLevel=600         ; typical flight level for aircraft [above ground level]
MissileSpeedVar=.25     ; speed flucuation percentage that guided missiles have
MissileROTVar=.25       ; rate of turn fluctuation percentage that guided missiles have

; Leave TeamDelays high, so AI won't que up tons of teams before he has time to even build them.
; Low values also prevent AI from replacing harvesters and other critical units.
; And now that AI builds larger teams, this becomes even more important. There is no need for AI to que
; up alot of large teams, when he only uses 1-2 attack teams at a given time.
TeamDelays=1000,1300,2200 ;1500,1500,2000 ;300,300,1200 ;2250,2700,3600 ; ORIGINAL_WAS_CHANGED
AIHateDelays=800,1000,2000 ;5400,4500,4050 ; ORIGINAL_WAS_CHANGED
AIAlternateProductionCreditCutoff=-1000 ;1 ;3000 ; ORIGINAL_WAS_CHANGED, (read below)...
                                        ; Set it to -1000 since AI would stop all production when low on money.
                                        ; Think it was trying to build default harvs, but could only build 1.
                                        ; This got the AI stuck and stopped all other production.
NodAIBuildsWalls=no
AIBuildsWalls=no
MultiplayerAICM=2000,1000,650 ;250,200,100 ; ORIGINAL_WAS_CHANGED, gives AI a nice boost at start.
HealScanRadius=10       ; how far should medic-type units scan for targets?  Used to override the range
                        ; of these units, because they need to have very short ranges
FillEarliestTeamProbability=90,90,75 ;100,80,60 ; ; ORIGINAL_WAS_CHANGED, left 10% chance to do build smthng else
MinimumAIDefensiveTeams=4,4,3 ;4,3,2 ; ORIGINAL_WAS_CHANGED, AI should always build all defences.
MaximumAIDefensiveTeams=4,4,3 ;6,5,4 ; ORIGINAL_WAS_CHANGED, inf def1, (inf def2), harv def and special def.
TotalAITeamCap=50,48,45 ;14,12,10    ; ORIGINAL_WAS_CHANGED, to make room for harvs, sensor arrays, aircraft, etc.
UseMinDefenseRule=no ;yes ; ORIGINAL_WAS_CHANGED. AI should always rush first. Offense is best defence...
DissolveUnfilledTeamDelay=9000 ; POSSIBLE_AI_TWEAKING. Leave it high to give AI time to build up taskforces.
