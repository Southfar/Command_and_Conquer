;RA2 Warheads
;************
; Some of these Warheads have been modified to work appropriately in
; the TS engine and to get as close to their original RA2 function within the
; options provided by TS as good as we could, but you can't expect things like MindControl and 
; LocomotorBeam to work in TS.
;----
; The Verses= flag has been translated from RA2's armor classes 
; by following calculation:
; (None + Flak) : 2 = None
; (Plate + Light) : 2 = Light
; (Wood + Medium) : 2 = Wood
; (Heavy + Steel) : 2 = Heavy
; Concrete simply stays Concrete, and Special_1 and Special_2 are of
; no importance in TS, and it would have been a mess translating them to, as
; they do not fit into the generic ArmorClass scheme, with higher armor 
; each class, but are rather special case vulnerabilities. (Though you could
; get me to putting Special_1 into 'Light' or 'None', if you want it that 
; badly, Vince...)
; 
; The 'Spread=' flag makes big trouble. Changes here seem to have little
; or no effects in the game. But this is, what we know it like to be from
; previous mods... seems like RA2 is the first game, where Spread= 
; (CellSpread=) has any effect at all...
;
; C Ya
; The WarHeadz Team
; GreenBarret, romanov221
;


; Good news,guys. I just received orders from Game design.
; Special_1 armor eventually occuring (terror drones only) 
; should be translated as to be 'light' on the unit, 
; so you don't need to modify it here...

