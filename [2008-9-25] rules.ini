[General]
UIName=Name:General
Name=Red Alert -- RealAlert v.2

; This is one version of a correction and expansion of Daniel Shatraw's mod RealAlert. 
; It is the last version (of which rules survive) prior to the version that was presented 
; as "Cyberian Dawn" on Revora, although it is unlikely that many of the features mentioned 
; on Revora were ever implemented into code. 
; To my knowledge, no code particularly close to "Cyberian Dawn" is extant. If such has 
; existed, it became the basis of further versions of "New World Order" and although 
; back-up files of different versions and builds exist, these are of versions far 
; progressed beyond "Cyberian Dawn". 
; 
; In terms of gameplay-relevant attributes, this file was left as found, with the exception of 
; fixing those settings that would be dysfunctional or even malignant. 
; However, formatting and IDs were substantially changed in order to align the file with 
; more recent versions, allowing for easier comparison between them. 

