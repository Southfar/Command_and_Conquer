; Stormtrooper StimPack
[BerzerkKit]

; Lv. a1: 	Grants +10% Speed, ROF, resistance to Suppression, for 10 sec. 
;		(This means that 
; Lv. a2: 	Grants +20% Speed, ROF, resistance to Suppression, for 20 sec. 
; Lv. a3: 	Grants +30% Speed, ROF, resistance to Suppression, for 30 sec. 
; Lv. b1:	Attaches briefly-timed deadly damage to target detonatable object owned by firing player. 
;		(This means that dim b outweighs. There is no boost, or its timing is effectively zero.) 
; Lv. b2: 	Attaches briefly-timed deadly damage plus AoE damage to target detonatable object owned by firing player. 
;		(This means that dim b outweighs. 
; Lv. a3bXXX: 	Grants +35% Speed, ROF, resistance to Suppression, for 35 sec. 
; Lv. a4b1	Grants +100% Speed, ROF, resistance to Suppression, for 20 sec. At the end of this timer, the boosted units are destroyed. 
;		(Dare to Die)
; Lv. a4b2	As Lv. a4b1, but invokes Honorable Discharge at the end of the timer (explosion). 
;		(Kamikaze)
; Lv. i (Overcharge): Grants +50% Speed, ROF, resistance to Suppression, for 30 sec. to overloadable units. Units take DoT for the duration of the effect. 
;
; (StimPack is initial damage, followed by boost?) 

