;
;
;
; Sub-type of Demolish. 
; Demolish-type SWs demolish (rather than sell) structures owned by the invoking player 
; to achieve some benefit, such as better survivor ratio, or other effects. 
; Detonate is the simplest variant, it explodes the target structure. 
;-----
; '26/6/24: Harmonizing with Banzai. 
;-----
; Subsumes Emperor's Rage, Frenzy. 
; Subsumes Honorable Discharge. 
; Lv. 1: Attaches briefly-timed deadly damage to target detonatable object owned by firing player. 
; Lv. 2: Attaches briefly-timed deadly damage plus AoE damage to target detonatable object owned by firing player. 
; Lv. 1: Grants +10% Speed, ROF, resistance to Suppression, for 10 sec. 
; Lv. 2: Grants +20% Speed, ROF, resistance to Suppression, for 20 sec. 
; Lv. 3: Grants +30% Speed, ROF, resistance to Suppression, for 30 sec. 
; Lv. 4 (Dare to Die): Grants +100% Speed, ROF, resistance to Suppression, for 20 sec. At the end of this timer, the boosted units are destroyed. 
; Lv. 5 (Kamikaze): As Lv. 4, but invokes Honorable Discharge at the end of the timer (explosion). 
; Lv. i (Overcharge): Grants +50% Speed, ROF, resistance to Suppression, for 30 sec. to overloadable units. Units take DoT for the duration of the effect. 
;
; (StimPack is initial damage, followed by boost?) 

;------------------------------------------------------------------------------
[SuperWeaponTypes]
+				= Detonate
+				= MeleeInfROFDummySpecial
+				= BanzaiSpecial

;------------------------------------------------------------------------------
; Deals deadly damage to detonatable units owned by firing player. 
; Can be fired at any building, and some units (Terrorist, Truck Blast, etc.)
[Detonate]
;----- Text -----
Name				= Detonate
UIName				= name:detonate
UIDescription			= desc:detonate
;----- Taxonomy -----
Type				= GenericWarhead
;----- Payload -----
SW.Warhead			= Detonation			; Different from explosion. 

;------------------------------------------------------------------------------
; Deals deadly damage to detonatable units owned by firing player. 
; Also deals explosive damage to everything around, even if the destroyed object in question 
; does not have an explosion. 
[Detonate2]:[Detonate]
;----- Text -----
Name				= Detonate 2
UIName				= name:
UIDescription			= desc:

