;
;
;
; These units are available to Forgotten and Mercenaries. 
; [Mercenaries] and [Forgotten] are both the super-class to "Nod", so this does not need to be listed particularly. 
; So the unit is used by insurgents and PMC. This allows us to model both Nod and GLA use, and generalize to other named/unnamed groups. 

;------------------------------------------------------------------------------
[VehicleTypes]
+				= Bike
+				= Bike_a1a; Bike_Armored_MG
+				= Bike_a1b; Bike_Armored_Rockets
+				= Bike_a1c; Flame Bike
+				= Bike_b1a; 
+				= Bike_b1b

;------------------------------------------------------------------------------
; Motorcycle
; Object GLAVehicleCombatBike (GLA Combat Bike)
; Formerly [CBIK]. 
Object Bike
[Bike]
;----- Text -----
Name				= Bike
DisplayName			= object:bike
UIName				= name:bike
UIDescription			= desc:bike
;----- Taxonomy -----
; SALVAGER only allows the pickup of loot crates. 
; Bonus crates can still be picked up by any unit, as usual. 
; And supply crates can only be picked up by dedicated gatherers. 
Category			= Recon
UnitGroup			= FromFactory
KindOf				= PRELOAD SELECTABLE CAN_ATTACK DONT_AUTO_CRUSH_INFANTRY ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS VEHICLE SALVAGER SCORE CLIFF_JUMPER
;----- Gfx -----
Image				= CBIKE
Draw				= W3DTruckDraw ModuleTag_01
OkToChangeModelColor		= Yes

; Normal Bike
;------------------------------
    DefaultConditionState
      Model = UVComBike
      WeaponFireFXBone    = PRIMARY Muzzle_B
      WeaponLaunchBone    = PRIMARY RocketFX03
