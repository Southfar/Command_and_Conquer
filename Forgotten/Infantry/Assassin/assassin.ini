;******************************************************************************
;*** Assassin *****************************************************************
;******************************************************************************
; Used by Arabs & Africans (part of Forgotten tech group). 
; This is the end of the Thief line (Thief to Dacoit to Thug to Assassin). 
; Assassin is the counterpart to Terrorist. 
; Whereas Terrorist detonates, or plants bombs, Assassin is a stealthed unit suited for killing specific infantry targets. 
; The Assassin cannot damage vehicles or buildings, though he can kill targets within them. 
; Can be recruited from neutral Assassins' Guild as mercenaries. 
; Toxin General's variant poisons units by touch (poison aura as veterancy upgrade). 

;------------------------------------------------------------------------------
[InfantryTypes]
+				= Assassin
+				= AssassinJack

