;******************************************************************************
;*** Militant *****************************************************************
;******************************************************************************
; Prior to to 2022/09/12, this was the Mujahid, with a head-cloth version for Desert theater
; and an ushanka version for any other theater. 
; This was changed because Yugoslavia should also use the ushanka version. 
; Thus, while the head-cloth version is _still_ ONLY mujahids (i.e. fielded by Forgotten), 
; the non-desert version is now sometimes mujahid (fielded by Forgotten), and sometimes 
; ...partisans? (fielded by Yugoslavia). 
;
; The relationship with Militants is a complicated one; 
; Militants should be available to Nod, Forgotten. 
; They should be available to Forgotten regardless of alignment. 
; Militants should also be used for gang members, raiders, etc. 
; Also use it for tribal 

; Tribal Militia
; This is the type that replaces the Technician for Allies and Soviet,  
; and is the survivor type of the Brotherhood. 

; "GLA Rebels" cost $150 in Gen/ZH. This is certainly not what we want massed Asian light infantry to cost. 

; Militants can be hired as Mercs ("Gunslinger"), just like Texans. 
; They are accessible to Nod as regular infantry. 

;------------------------------------------------------------------------------
[InfantryTypes]
+				= Militant
+				= Militant_ma		; Slasher ; Gangster_Male_A
+				= Militant_mb		; Turd Muncher ; Gangster_Male_B ; Civilian_Gangster_Male
+				= Militant_f		; Lizzie the Lizard
+				= Partisan
+				= PartisanD

;------------------------------------------------------------------------------
; Militant, or Volunteer
; Subsumes MercenaryGunslinger (electric rules's Merc3). 
; Gunslinger himself is spun out into a new separate unit. 
Object Militant

;------------------------------------------------------------------------------
; The basic infantry type, one step above the stone-throwing rioter. 
; In TW, Militant > hp = 40. 
; Also in TW, xxx Damage = . 
; xxx is the same weapon as used in xxx, where it has Damage = xxx. 
; It follows that one point of health in TW equals xxx points of health in TS. 
; Since the health metric is the same between TS, RA2, Generals, it follows that it equals the same amount in all of these settings. 
; It follows that hp 40 in TW equals Strength = xxx in those games. 
; Formerly [Militant]. 
[Fgtr]
$include				= Civ3
;----- Text -----
Name					= Militant
DisplayName				= OBJECT:Militant
UIName					= name:militant
UIDescription				= desc:militant
;----- Taxonomy -----
Category				= Soldier
KindOf					= PRELOAD SELECTABLE CAN_ATTACK ATTACK_NEEDS_LINE_OF_SIGHT CAN_CAST_REFLECTIONS INFANTRY SCORE PARACHUTABLE
SALVAGER
UnitGroup				= FromBarracks
Civilian				= no
Infantry				= yes
EditorSorting				= INFANTRY
;----- Gfx -----
Image					= infy_gunXXX						; CONS
AlternateArcticArt			= yes
Draw					= W3DModelDraw ModuleTag_01
OkToChangeModelColor			= Yes
ChaosEffect				= SmallChaosFX
HawkEffect				= SmallHawkFX
Shadow = SHADOW_DECAL
ShadowSizeX = 14;
ShadowSizeY = 14;
ShadowTexture = ShadowI;


; Bldg-capture
ConditionState				= UNPACKING
	Model				= UIRGrd_F_SKN
	Animation			= UIRGrd_F_SKL.UIRGrd_F_FDP1
	AnimationMode			= ONCE
	End
AliasConditionState			= UNPACKING REALLYDAMAGED

ConditionState				= RAISING_FLAG
      Model             = UIRGrd_F_SKN
      Animation         = UIRGrd_F_SKL.UIRGrd_F_FDP2
      AnimationMode     = ONCE
      TransitionKey     = TRANS_Raising
    End
    AliasConditionState = RAISING_FLAG REALLYDAMAGED

    ConditionState = PACKING
      Model             = UIRGrd_F_SKN
      Animation         = UIRGrd_F_SKL.UIRGrd_F_FDP1
      AnimationMode     = ONCE_BACKWARDS
      Flags             = START_FRAME_LAST
      TransitionKey     = TRANS_Packing
    End
    AliasConditionState = PACKING REALLYDAMAGED

    TransitionState = TRANS_Raising TRANS_Packing
      Model             = UIRGrd_F_SKN
      Animation         = UIRGrd_F_SKL.UIRGrd_F_FDP2
      AnimationMode     = ONCE_BACKWARDS
      Flags             = START_FRAME_LAST
    End
;----- Body -----
Body					= ActiveBody ModuleTag_02
	MaxHealth			= 90.00
	InitialHealth			= 90.00
 	End
Strength				= 90.00						; 40, x2.25 to make it scalable. This means Rifleman should be 150. 
Geometry				= CYLINDER
GeometryMajorRadius			= 10.0
GeometryMinorRadius			= 10.0
GeometryHeight				= 12.0
GeometryIsSmall				= Yes
