;******************************************************************************
;*** Factory ******************************************************************
;******************************************************************************
; This generic factory can be assigned to factions to produce their military vehicles. 
; It can also be assigned to the Neutral house as a pre-placed map structure to give access to the civilian vehicles. 

;------------------------------------------------------------------------------
[BuildingTypes]
+				= Factory
; D5A44AD25C1CD

;------------------------------------------------------------------------------
; Generic Factory
; TS' ABAN03 (Abandoned Factory) + GAOLDCC3 (Old Factory). 
; Formerly [GAOLDCC3], [GGFACT], [GenericFactory], [GenFactory], [GGFactory]. 
;; ontologically incomplete - don't use
[Factory]
;----- Text -----
Name				= Factory
UIName				= name:factory
UIDescription			= desc:factory
Nominal				= yes
;----- Taxonomy -----
IsBase				= no
BaseNormal			= no
WeaponsFactory			= yes
;----- Gfx -----
Image				= CANEWY21
NaturalSmokeLocation		= -12, 0, 370
;----- Body -----
Strength			= 1000				; Was 500. That value is moved to Abandoned. 
; InitialStrength		= 500
Bib				= yes
ClickRepairable			= no
;----- Armor -----
Armor				= wood_ts
Spyable				= yes				; "no" moved to Abandoned. ; Abandoned buildings are not spyable. 
Capturable			= yes
ImmuneToPsionics		= no
; Abandoned buildings should be ImmuneToPsionics. 
;----- Perception -----
Sight				= 4

;Sight=6 ; UC base values
Sight=9 ; Let's see if that works.
;----- Availability -----
Side				= Terran
Owner				= Neutral			; Gets replaced by the specific versions for each Side. 
; House				= 
TechLevel			= 2
Cost				= 2000
Adjacent			= 2
;----- Score -----
Points				= 80				; Abandoned should be 5. 
;----- Produces -----
Factory				= UnitType
DeployTime			= .044
;ExitCoord = 1280,256,0
;ExitCoord = 610,188,0 ;above - 670 and 68
;ExitCoord=384,96,0 
ExitCoord			= 512,256,0			; gs 96 isn't the center of a cell.  This causes pop when the Force Track grabs hold.
NumberImpassableRows		= 1				; Tanks unlimbo on the second cell.  Drive locomotor's Force Track ignores the building, but hover gets stuck
;----- Load -----
Crewed				= yes
CanBeOccupied			= 
MaxNumberOccupants		= 
CanOccupyFire			= yes
;----- Power -----
Power				= -25
;----- UI -----
BuildCat			= Tech
; RadarInvisible		= yes						; [ABAN03] is yes, but if tech and UC buildings are no, this should not be. 
;----- AI -----
AIBuildThis			= yes						; Since this building is tied to MultiplayPassive, this has no practical effect. 
ThreatPosed			= 0
; WantsExtraSpace		= yes						; gs This will look for a space AIBaseSpacing+1 when the computer places, but will settle for AIBasSpacing
;----- Damage & Destruction -----
DamageParticleSystems		= SparkSys, SmallGreySSys, BigGreySmokeSys
DamageSmokeOffset		= 395, 750, 410					; 408, 880, 435
MinDebris			= 5
MaxDebris			= 15						; ts: 0
DebrisAnim			= Dbris1sm,Dbris1lg,Dbris4sm,Dbris5sm,Dbris4lg,Dbris7sm,Dbris8sm,Dbris5lg,Dbris4lg
DebrisAnim			= Dbris3sm,Dbris4lg,Dbris4sm,Dbris6sm,Dbris7lg,Dbris7sm,Dbris8sm,Dbris10lg,Dbris10sm
Explosion			= TWLT070,S_BANG48,S_BRNL58,S_CLSN58,S_TUMU60




